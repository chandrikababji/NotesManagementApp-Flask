<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - NotesNest</title>
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>

    <a href="/" class="back-btn">Back</a>
    <div class="container">
        <form method="POST">
            <h1>NotesNest</h1>
            <h2>Login</h2>
            <label>useremail</label>
            <input type="text" name="useremail" placeholder="Enter Username" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit">Login</button>
        </form>
            <a href="{{url_for('forgotpwd')}}">Forgot Password</a>
    </div>


</body>
</html>
