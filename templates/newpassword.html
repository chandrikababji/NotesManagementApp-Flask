<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Password - NotesNest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/register.css">

    <style>
        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }
        .success-message {
            color: lightgreen;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<a href="{{url_for('welcome')}}" class="register-back-btn">Back</a>

<div class="register-container">
    
    <form id="resetForm">
        <h2 style="color: red;">Password Reset</h4>
        
        <input type="password" id="password" 
               placeholder="New Password" 
               class="register-input" required>

        <input type="password" id="confirmPassword" 
               placeholder="Confirm Password" 
               class="register-input" required>

        <div id="message" class="error-message"></div>

        <button type="submit" class="register-button">
            Reset Password
        </button>

    </form>
</div>

<script>
document.getElementById("resetForm").addEventListener("submit", function(e) {
    e.preventDefault(); // prevent normal form submit

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const messageDiv = document.getElementById("message");

    // Strong password validation
    const strongPassword = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

    if (!strongPassword.test(password)) {
        messageDiv.innerHTML = "Password must be at least 8 characters and include uppercase, lowercase, number and special character.";
        messageDiv.className = "error-message";
        return;
    }

    if (password !== confirmPassword) {
        messageDiv.innerHTML = "Passwords do not match.";
        messageDiv.className = "error-message";
        return;
    }

    // Send PUT request to backend
    fetch("{{url_for('newpassword',data=data)}}", {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            password: password
        })
    })
    .then(response => response.json())
    .then(data => {
        messageDiv.innerHTML = data.message;
        messageDiv.className = "success-message";
    })
    .catch(error => {
        messageDiv.innerHTML = "Something went wrong.";
        messageDiv.className = "error-message";
    });
});
</script>

</body>
</html>
